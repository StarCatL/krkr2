name: Build Linux (ARM64)

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm   # GitHub 原生 ARM64 运行器
    env:
      VCPKG_ROOT: ${{ github.workspace }}/.act/vcpkg
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y perl gcc g++ bison python3 yasm nasm ninja-build
          sudo apt install -y libxft-dev libxext-dev libxxf86vm-dev libx11-dev libxmu-dev \
                               libglu1-mesa-dev libgl2ps-dev libxi-dev libzip-dev libpng-dev \
                               libcurl4-gnutls-dev libfontconfig1-dev libsqlite3-dev libglew-dev \
                               libssl-dev libgtk-3-dev binutils autoconf autoconf-archive automake \
                               libtool pkg-config libltdl-dev

          wget https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
          chmod +x dotnet-install.sh
          ./dotnet-install.sh --channel 8.0
          echo "$HOME/.dotnet" >> $GITHUB_PATH

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.31.1

      - name: Setup vcpkg
        run: |
          if [ ! -d "${{ env.VCPKG_ROOT }}" ]; then
            git clone https://github.com/microsoft/vcpkg.git ${{ env.VCPKG_ROOT }}
          fi
          ${{ env.VCPKG_ROOT }}/bootstrap-vcpkg.sh

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.18
        with:
          key: ${{ github.job }}

      - name: Build Linux (ARM64)
        run: |
          cmake --preset="Linux Release Config" -DENABLE_TESTS=OFF -DBUILD_TOOLS=OFF
          cmake --build --preset="Linux Release Build"
          
          # 复制 FMOD 库（如果有）
          # cp $(find out/linux/release/ -name libfmod.so) out/linux/release/bin/krkr2 || true
          # cp $(find out/linux/release/ -name libfmodL.so) out/linux/release/bin/krkr2 || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: krkr2-linux-aarch64
          path: |
            out/linux/release/bin/krkr2/**
